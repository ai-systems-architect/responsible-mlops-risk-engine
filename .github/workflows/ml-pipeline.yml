name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest python-dotenv

      - name: Show project structure
        run: ls -la

      - name: Lint with flake8
        run: |
          flake8 src/ config.py --max-line-length=100 --ignore=E501,W503,E241

      - name: Check project structure
        run: |
          ls -la
          test -f config.py && echo "config.py found" || echo "config.py missing"
          test -d src/data && echo "src/data found" || echo "src/data missing"
          test -f docs/decision_log.md && echo "decision_log.md found" || echo "missing"
          echo "Structure check complete"